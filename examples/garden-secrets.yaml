# Example Garden manifest demonstrating secret management
# Iteration 4 - Weaver: Secret volumes with encrypted storage
#
# Prerequisites:
#   1. Create secret: gl secret create db-creds --from-literal password=s3cr3t --version 1
#   2. Create secret: gl secret create api-token --from-literal token=abc123 --version 1

apiVersion: v1
kind: Garden
meta:
  name: secrets-demo
  id: secret-001

net:
  preset: bridge

volumes:
  # Secret volume - materialized to tmpfs with strict permissions (0400)
  - name: db-credentials
    secret:
      secretRef: db-creds@1

  # API token secret
  - name: api-credentials
    secret:
      secretRef: api-token@1

  # Config volume for non-sensitive configuration
  - name: app-config
    config:
      data:
        app.conf: |
          log_level=info
          port=8080

containers:
  - name: app
    rootfs:
      path: ./examples/rootfs-busybox
    entrypoint:
      cmd:
        - /bin/sh
        - -c
        - |
          echo "Application starting..."
          echo "Reading database credentials..."
          # Secret files are mounted with 0400 permissions (read-only for owner)
          if [ -f /secrets/db/password ]; then
            echo "DB password: (masked for security)"
            # In real app: export DB_PASSWORD=$(cat /secrets/db/password)
          fi

          echo "Reading API token..."
          if [ -f /secrets/api/token ]; then
            echo "API token: (masked for security)"
            # In real app: export API_TOKEN=$(cat /secrets/api/token)
          fi

          echo "Reading app configuration..."
          cat /config/app.conf

          echo "Starting application with secrets..."
          sleep 60
      env:
        - "APP_ENV=production"
    volumeMounts:
      - name: db-credentials
        mountPath: /secrets/db
        readOnly: true
      - name: api-credentials
        mountPath: /secrets/api
        readOnly: true
      - name: app-config
        mountPath: /config
        readOnly: true
    limits:
      memory:
        max: "128Mi"

# Usage:
#   1. Create secrets first:
#      gl secret create db-creds --from-literal password=s3cr3t --version 1
#      gl secret create api-token --from-literal token=abc123 --version 1
#
#   2. Run the pod:
#      gl garden run -f examples/garden-secrets.yaml
#
#   3. Secrets are materialized to tmpfs in-memory filesystem
#   4. Files have strict permissions (0400 - read-only for owner)
#   5. Values are masked in logs for security
